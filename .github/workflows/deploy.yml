name: 🚀 Deploy
on:
  push:
    branches:
      - master
      - dev
  pull_request: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: write
  contents: read

jobs:
  lint:
    name: ⬣ ESLint
    runs-on: ubuntu-22.04
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: ⎔ Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: 📥 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🏄 Copy test env vars
        run: cp .env.example .env

      - name: 🛠 Setup Database
        run: bunx prisma migrate deploy && bunx prisma generate

      - name: 🔬 Lint
        run: bun run lint

  typecheck:
    name: ʦ TypeScript
    runs-on: ubuntu-22.04
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: ⎔ Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: 📥 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🏄 Copy test env vars
        run: cp .env.example .env

      - name: 🏗 Build
        run: bun run build

      - name: 🛠 Apply migrations
        run: bunx prisma migrate deploy

      - name: 🔎 Type check
        run: bun run typecheck

  vitest:
    name: ⚡ Vitest
    runs-on: ubuntu-22.04
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: ⎔ Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: 📥 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🏄 Copy test env vars
        run: cp .env.example .env

      - name: 🛠 Setup Database
        run: bunx prisma migrate deploy && bunx prisma generate

      - name: ⚡ Run vitest
        run: bun run test --coverage

  container-verify:
    name: 🔍 Container build check
    runs-on: ubuntu-24.04
    # Pull-request-only gate: catches Dockerfile regressions before merge.
    # The existing `container` job already does a real build+push on push
    # events to master/dev, so this is redundant for those branches.
    if: ${{ github.event_name == 'pull_request' }}
    steps:
      - name: ⬇️ Checkout repo
        uses: actions/checkout@v6

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🏄 Stage Dockerfile dockerignore at repo root
        run: cp other/Dockerfile.dockerignore .dockerignore

      - name: 🏗 Verify Dockerfile builds for linux/amd64
        uses: docker/build-push-action@v6
        with:
          context: .
          file: other/Dockerfile
          platforms: linux/amd64
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            COMMIT_SHA=${{ github.sha }}

  # playwright:
  #   name: 🎭 Playwright
