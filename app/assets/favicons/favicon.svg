<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" fill="none" viewBox="0 0 512 512">
  <style>
    .bg { fill: #52a868; }
    .card { fill: #ffffff; }
    .accent { fill: #52a868; }
    .accent-stroke { stroke: #52a868; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #3d8a50; }
      .card { fill: #ffffff; }
      .accent { fill: #3d8a50; }
      .accent-stroke { stroke: #3d8a50; }
    }
  </style>
  <!-- Green background -->
  <rect class="bg" width="512" height="512" rx="80"/>
  <!-- White card -->
  <rect class="card" x="106" y="96" width="280" height="360" rx="20"/>
  <!-- Title bar -->
  <rect class="accent" x="141" y="136" width="180" height="20" rx="6"/>
  <!-- Divider -->
  <rect class="accent" x="141" y="176" width="210" height="4" rx="2" opacity="0.3"/>
  <!-- Bullet lines -->
  <circle class="accent" cx="156" cy="216" r="8"/>
  <rect class="accent" x="176" y="209" width="140" height="14" rx="4" opacity="0.5"/>
  <circle class="accent" cx="156" cy="256" r="8"/>
  <rect class="accent" x="176" y="249" width="160" height="14" rx="4" opacity="0.5"/>
  <circle class="accent" cx="156" cy="296" r="8"/>
  <rect class="accent" x="176" y="289" width="120" height="14" rx="4" opacity="0.5"/>
  <!-- Checkmark -->
  <path class="accent-stroke" d="M226 356 L246 381 L286 331" stroke-width="14" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
